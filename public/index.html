<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CALTRC — Track your daily calories and macronutrients">
  <title>CALTRC — Food Logger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="app">
    <header class="app-header">
      <div class="header-row">
        <h1 class="app-title">CALTRC</h1>
        <button class="btn-logout" id="logout-btn">Log out</button>
      </div>
      <p class="user-greeting" id="user-greeting">Daily food log</p>
    </header>


    <!-- Goals Section -->
    <section class="section">
      <h2 class="section-title">Today's goal progress</h2>
      <div class="card">
        <div id="goal-content">
          <div class="log-empty">Loading goals...</div>
        </div>
      </div>
    </section>

    <!-- Add Food Section -->
    <section class="section">
      <h2 class="section-title">Add food</h2>
      <div class="card">
        <div class="tabs" role="tablist">
          <button class="tab active" role="tab" data-tab="search" id="tab-search" aria-selected="true">Search
            USDA</button>
          <button class="tab" role="tab" data-tab="manual" id="tab-manual" aria-selected="false">Manual entry</button>
        </div>

        <!-- Search Tab -->
        <div class="tab-panel active" id="panel-search" role="tabpanel">
          <div class="form-group">
            <label for="food-search">Food name</label>
            <div class="search-wrapper">
              <input type="text" id="food-search" class="search-input" placeholder="e.g. chicken breast"
                autocomplete="off">
              <span class="search-status" id="search-status"></span>
            </div>
          </div>
          <div id="search-results"></div>
        </div>

        <!-- Manual Tab -->
        <div class="tab-panel" id="panel-manual" role="tabpanel">
          <form id="manual-form">
            <div class="form-group">
              <label for="manual-name">Food name</label>
              <input type="text" id="manual-name" placeholder="e.g. Grilled salmon" required>
              <p class="error-text" id="name-error" hidden>Food name is required</p>
            </div>
            <div class="form-row-4">
              <div class="form-group">
                <label for="manual-cal">Calories</label>
                <input type="number" id="manual-cal" placeholder="0" min="0" step="1">
              </div>
              <div class="form-group">
                <label for="manual-protein">Protein (g)</label>
                <input type="number" id="manual-protein" placeholder="0" min="0" step="0.1">
              </div>
              <div class="form-group">
                <label for="manual-carbs">Carbs (g)</label>
                <input type="number" id="manual-carbs" placeholder="0" min="0" step="0.1">
              </div>
              <div class="form-group">
                <label for="manual-fat">Fat (g)</label>
                <input type="number" id="manual-fat" placeholder="0" min="0" step="0.1">
              </div>
            </div>
            <button type="submit" class="btn btn-primary btn-full" id="manual-submit">
              <span class="spinner"></span>
              <span class="btn-text">Add entry</span>
            </button>
          </form>
        </div>
      </div>
    </section>

    <!-- Daily Log Section -->
    <section class="section">
      <div class="date-nav">
        <h2 class="section-title" style="margin-bottom: 0;">Daily log</h2>
        <input type="date" id="log-date" aria-label="Select date">
      </div>
      <div class="card">
        <div id="log-content">
          <div class="log-empty">Loading...</div>
        </div>
      </div>
    </section>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <!-- Survey Modal — rendered before app.js so DOM refs are always valid -->
  <div class="modal-backdrop hidden" id="survey-modal-backdrop" aria-hidden="true">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="survey-modal-title">
      <h2 id="survey-modal-title" class="section-title">Complete your health profile</h2>
      <p class="survey-help">This one-time survey helps us calculate your personalized daily calorie and macro targets.</p>
      <form id="survey-form">
        <div class="form-row">
          <div class="form-group">
            <label for="survey-age">Age</label>
            <input type="number" id="survey-age" min="13" max="100" required>
          </div>
          <div class="form-group">
            <label for="survey-height">Height (cm)</label>
            <input type="number" id="survey-height" min="120" max="230" required>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="survey-weight">Weight (kg)</label>
            <input type="number" id="survey-weight" min="30" max="350" step="0.1" required>
          </div>
          <div class="form-group">
            <label for="survey-sex">Biological sex</label>
            <select id="survey-sex" required>
              <option value="male">Male</option>
              <option value="female">Female</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label for="survey-activity">Activity level</label>
            <select id="survey-activity" required>
              <option value="sedentary">Sedentary (little/no exercise)</option>
              <option value="light">Light (1-3 days/week)</option>
              <option value="moderate" selected>Moderate (3-5 days/week)</option>
              <option value="active">Active (6-7 days/week)</option>
              <option value="veryActive">Very active (physical job + training)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="survey-goal-pace">Primary goal</label>
            <select id="survey-goal-pace" required>
              <option value="lose">Lose fat</option>
              <option value="maintain" selected>Maintain weight</option>
              <option value="gain">Build muscle</option>
            </select>
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="survey-submit">Save &amp; continue</button>
        <p class="survey-status" id="survey-status"></p>
      </form>
    </div>
  </div>

  <script src="app.js"></script>

</body>

</html>
